<!DOCTYPE html>
<html>
<head>
    <title>Register - SecureBank</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="logo">🏦</div>
        <h2>Create Account</h2>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">Join SecureBank today!</p>
        
        <form method="POST">
            <div class="form-group">
                <label>Choose Username</label>
                <input type="text" name="username" placeholder="Enter desired username" required>
            </div>
            
            <div class="form-group">
                <label>Create Password</label>
                <input type="password" name="password" placeholder="Enter secure password" required>
            </div>
            
            <button type="submit" class="btn btn-primary">✅ Create Account</button>
        </form>
        
        <p class="link">
            Already have an account? <a href="/login">Login here</a>
        </p>
    </div>
    
    <div class="footer">
        © 2026 SecureBank. All rights reserved.
    </div>
</body>
</html>
